<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>ToDo</h1>

        <section class="projects">
            <form id="project-form">
                <input type="text" id="project-name" placeholder="New project name" required maxlength="100">
                <button type="submit">Add project</button>
            </form>
            <label for="project-select">Project:</label>
            <select id="project-select"></select>
        </section>

        <form id="task-form">
            <input type="text" id="title" placeholder="What needs doing?" required maxlength="100">
            <input type="text" id="description" placeholder="Notes (optional)" maxlength="500">
            <button type="submit">Add</button>
        </form>

        <div class="filters">
            <button data-filter="all" class="active">All</button>
            <button data-filter="pending">Pending</button>
            <button data-filter="completed">Completed</button>
        </div>

        <ul id="task-list"></ul>

        <p id="status"></p>
    </main>

    <script src="app.js"></script>
</body>
</html>
