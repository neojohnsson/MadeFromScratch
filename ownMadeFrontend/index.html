<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ToDo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>My Tasks</h1>
<div>
    <button id="load-tasks">Load Tasks</button>
    <label>
        <input type="text" placeholder="Task Name" id="task-title">
        <input type="text" placeholder="Task Description" id="task-description">
    </label>
    <button id="add-task">Add Task</button>
</div>
<div id="tasks">
    <ul id="task-list"></ul>
</div>
<script src="script.js"></script>
</body>
</html>
