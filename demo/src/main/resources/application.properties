spring.application.name=demo
# Use a file-based H2 database so data survives restarts
spring.datasource.url=jdbc:h2:file:./data/tasks
spring.datasource.username=sa
spring.datasource.password=
# Tell Hibernate to create/update the schema on startup
# 'update' = create missing tables, add missing columns, never delete anything
spring.jpa.hibernate.ddl-auto=update
# Show generated SQL in the console (helpful while learning)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Enable the H2 web console at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
